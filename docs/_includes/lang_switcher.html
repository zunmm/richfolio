{%- comment -%}
  Compute the canonical path (no locale prefix) as a relative segment list, so polyglot's
  URL-rewrite regex (which matches /...) has nothing to mangle. We encode segments as a JSON
  array in a data attribute and let runtime JS build the hrefs.

  Language switcher is a <select> dropdown so the header stays compact as we add more
  languages — listing 6+ inline would crowd the header.
{%- endcomment -%}
{%- assign canonical_path = page.url -%}
{%- for lang in site.languages -%}
  {%- unless lang == site.default_lang -%}
    {%- assign prefix = '/' | append: lang -%}
    {%- assign prefix_slash = prefix | append: '/' -%}
    {%- if canonical_path == prefix or canonical_path contains prefix_slash -%}
      {%- assign canonical_path = canonical_path | remove_first: prefix -%}
    {%- endif -%}
  {%- endunless -%}
{%- endfor -%}
{%- if canonical_path == '' -%}{%- assign canonical_path = '/' -%}{%- endif -%}
{%- assign canonical_no_slash = canonical_path | remove_first: '/' -%}
{%- assign baseurl_no_slash = site.baseurl | remove_first: '/' -%}
{%- assign current_lang = page.lang | default: site.default_lang -%}

<div class="lang-switcher-wrap"
     data-canonical="{{ canonical_no_slash }}"
     data-base="{{ baseurl_no_slash }}"
     data-current="{{ current_lang }}"
     data-default="{{ site.default_lang }}"
     style="display: inline-flex; align-items: center;">
  <select class="lang-switcher"
          aria-label="Language"
          style="background: transparent; color: inherit; border: 1px solid currentColor; border-radius: 4px; padding: 2px 22px 2px 8px; font-size: 0.8125rem; line-height: 1.4; cursor: pointer; opacity: 0.75; appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url('data:image/svg+xml;utf8,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;6&quot; viewBox=&quot;0 0 10 6&quot;&gt;&lt;path d=&quot;M1 1l4 4 4-4&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.5&quot; fill=&quot;none&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;/svg&gt;'); background-repeat: no-repeat; background-position: right 6px center;">
    <option value="en" data-hreflang="en">EN</option>
    <option value="zh-CN" data-hreflang="zh-CN">简体中文</option>
    <option value="zh-TW" data-hreflang="zh-TW">繁體中文</option>
    <option value="ja" data-hreflang="ja">日本語</option>
    <option value="ko" data-hreflang="ko">한국어</option>
    <option value="es" data-hreflang="es">Español</option>
  </select>
</div>
<style>
  .lang-switcher:hover, .lang-switcher:focus { opacity: 1; outline: none; }
  .lang-switcher option { color: #000; background: #fff; }
</style>
<script>
(function () {
  var wrap = document.querySelector('.lang-switcher-wrap');
  if (!wrap) return;
  var select = wrap.querySelector('.lang-switcher');
  if (!select) return;
  var canonical = wrap.dataset.canonical || '';
  var base = wrap.dataset.base ? '/' + wrap.dataset.base : '';
  var defaultLang = wrap.dataset.default;
  var current = wrap.dataset.current;

  // Mark the current language as selected
  select.value = current;

  // Navigate when the user picks a different language
  select.addEventListener('change', function () {
    var lang = select.value;
    if (lang === current) return;
    var prefix = lang === defaultLang ? '' : '/' + lang;
    window.location.href = base + prefix + '/' + canonical;
  });
})();
</script>
