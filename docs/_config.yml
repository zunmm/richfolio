title: Richfolio
description: Zero-maintenance portfolio monitoring — daily briefings with allocation gaps, AI buy signals, and news.
url: https://furic.github.io
baseurl: /richfolio

remote_theme: just-the-docs/just-the-docs

logo: /richfolio/icon.png

color_scheme: dark

search_enabled: true
search.heading_level: 3

aux_links:
  "GitHub":
    - "https://github.com/furic/richfolio"
  "Facebook":
    - "https://www.facebook.com/richfolioapp/"
  "LinkedIn":
    - "https://www.linkedin.com/company/richfolio"

aux_links_new_tab: true

footer_content: "Richfolio &mdash; free, open-source portfolio monitoring."

nav_sort: order

plugins:
  - jekyll-remote-theme
  - jekyll-polyglot

languages: ["en", "zh-CN", "zh-TW", "ja", "ko", "es"]
default_lang: "en"
exclude_from_localization: ["icon.png", "feature-image.png", "screenshots", "mockups", "analysis", "assets"]
parallel_localization: true

exclude:
  - Gemfile.lock
